syntax = "proto3";

package car_factory_messages;

message Meta {

    bool is_local_event = 1;
    repeated string tags = 2;
    uint64 timestamp_micros = 3;
    uint32 lamport = 4;
    string app_id = 5;
    string event_id = 6;
    string stream = 7;
    uint32 offset = 8;
}

message SteelRoll {

    Meta meta = 1;
    string lbj = 2;
}

message SteelParts {

    Meta meta = 1;
    string lbj = 2;
}

message CarBody {

    string shape = 1;
    Meta meta = 2;
    string lbj = 3;
}

message Event {

    oneof sealed_value {

        SteelRoll steel_roll = 1;
        SteelParts steel_parts = 2;
        CarBody car_body = 3;
    }
}