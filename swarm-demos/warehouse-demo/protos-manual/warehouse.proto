message Event {
  oneof sealed_value {
    PartReq partReq = 1;
    PartOK partOK = 2;
    Pos pos = 3;
    ClosingTime closingTime = 4;
    Car car = 5;
  }
}

message Meta {
  bool isLocalEvent = 1;
  repeated string tags = 2;
  uint64 timestampMicros = 3;
  uint32 lamport = 4;
  string appId = 5;
  string eventId = 6;
  string stream = 7;
  uint32 offset = 8;
}

message PartReq {
  string partName = 1;
  string lbj = 2;
  Meta meta = 3;
}

message PartOK {
  string partName = 1;
  string lbj = 2;
  Meta meta = 3;
}

message Pos {
  string position = 1;
  string partName = 2;
  string lbj = 3;
  Meta meta = 4;
}

message ClosingTime {
  string timeOfDay = 1;
  string lbj = 2;
  Meta meta = 3;
}

message Car {
  string partName = 1;
  string modelName = 2;
  string lbj = 3;
  Meta meta = 4;
}

