syntax = "proto3";

package test;

message Meta {

    bool is_local_event = 3;
    repeated string tags = 4;
    uint64 timestamp_micros = 5;
    uint32 lamport = 6;
    string app_id = 7;
    string event_id = 8;
    string stream = 9;
    uint32 offset = 10;
}

message ClosingTypeNested {

    repeated double number = 3;
    repeated double other = 4;
}

message ClosingTimePayload {

    string time_of_day = 3;
    ClosingTypeNested nested = 4;
    ClosingTimePayload closing = 5;
}

message partReq {

    string part_name = 3;
    Meta meta = 1;
    string lbj = 2;
}

message partOK {

    string part_name = 3;
    Meta meta = 1;
    string lbj = 2;
}

message pos {

    string position = 3;
    string part_name = 4;
    Meta meta = 1;
    string lbj = 2;
}

message closingTime {

    string time_of_day = 3;
    ClosingTypeNested nested = 4;
    ClosingTimePayload closing = 5;
    Meta meta = 1;
    string lbj = 2;
}

message car {

    string part_name = 3;
    string model_name = 4;
    Meta meta = 1;
    string lbj = 2;
}

message thing {

    string name = 3;
    Meta meta = 1;
    string lbj = 2;
}

message noPayload {

    Meta meta = 1;
    string lbj = 2;
}

message noPayload1 {

    Meta meta = 1;
    string lbj = 2;
}

message Event {

    oneof sealed_value {

        partReq part_req = 3;
        partOK part_ok = 4;
        pos pos = 5;
        closingTime closing_time = 6;
        car car = 7;
        thing thing = 8;
        noPayload no_payload = 9;
        noPayload1 no_payload_1 = 10;
    }
}