syntax = "proto3";

package warehouse_messages;

message Meta {

    bool is_local_event = 1;
    repeated string tags = 2;
    uint64 timestamp_micros = 3;
    uint32 lamport = 4;
    string app_id = 5;
    string event_id = 6;
    string stream = 7;
    uint32 offset = 8;
}

message PartReq {

    string part_name = 1;
    Meta meta = 2;
    string lbj = 3;
}

message PartOK {

    string part_name = 1;
    Meta meta = 2;
    string lbj = 3;
}

message Pos {

    string position = 1;
    string part_name = 2;
    Meta meta = 3;
    string lbj = 4;
}

message ClosingTime {

    string time_of_day = 1;
    Meta meta = 2;
    string lbj = 3;
}

message Car {

    string part_name = 1;
    string model_name = 2;
    Meta meta = 3;
    string lbj = 4;
}

message Event {

    oneof sealed_value {

        PartReq part_req = 1;
        PartOK part_ok = 2;
        Pos pos = 3;
        ClosingTime closing_time = 4;
        Car car = 5;
    }
}