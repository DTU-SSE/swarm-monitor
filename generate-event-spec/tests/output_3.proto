syntax = "proto3";

package test;

message Meta {

    bool is_local_event = 1;
    repeated string tags = 2;
    uint64 timestamp_micros = 3;
    uint32 lamport = 4;
    string app_id = 5;
    string event_id = 6;
    string stream = 7;
    uint32 offset = 8;
}

message partID {

    string part_name = 0;
    Meta meta = 2;
}

message part {

    string part_name = 0;
    Meta meta = 2;
}

message pos {

    string position = 0;
    string part_name = 1;
    Meta meta = 3;
}

message time {

    string time_of_day = 0;
    Meta meta = 2;
}

message car {

    string part_name = 0;
    string model_name = 1;
    Meta meta = 3;
}

message Event {

    oneof sealed_value {

        partID part_id = 0;
        part part = 1;
        pos pos = 2;
        time time = 3;
        car car = 4;
    }
}